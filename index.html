        .submit-btn.loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }

        .submit-btn.loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            right: 16px;
            margin-top: -8px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .float-text-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .float-text {
            position: absolute;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: float 6s ease-in-out forwards;
            padding: 4px 8px;
            border-radius: 4px;
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-sizing: border-box;
        }

        @keyframes float {
            0% {
                opacity: 1;
                transform: translateY(var(--startY)) scale(0.8);
            }
            70% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(-40vh) scale(1.2);
            }
        }

        @media (min-width: 768px) {
            .float-text {
                font-size: 18px;
                max-width: 40%;
            }
        }
    </style>
